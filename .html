<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Animation Demo</title>
    <style>
        .car-box {
            width: 200px;
            height: 200px;
            background-image: url('chrome-extension://bnjoienjhhclcabnkbhhfndecoipmcdg/background/keniu/layout/index.html?picpath=file%3A%2F%2F%2FC%3A%2FUsers%2F11643%2FPictures%2F%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260328162408_40_6.jpg');
            background-size: cover;
            background-position: center;
            animation: slide 8s linear infinite;
        }

        @keyframes slide {
            0% {
                background-position: 0% 50%;
            }
            100% {
                background-position: 100% 50%;
            }
        }
    </style>
</head>
<body>
    <div class="car-box"></div>
</body>
</html>
