<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Diagonal Drive & Brake (Side View)</title>
    <style>
        /* 容器：固定200px×200px，模拟路面 */
        .road {
            width: 200px;
            height: 200px;
            position: relative;
            overflow: hidden;
            background: #ffffff;
        }

        /* 车辆：侧视跑车尺寸适配容器，初始在右下角 */
        .car {
            width: 180px;
            height: 90px;
            position: absolute;
            bottom: 0;
            right: 0;
            background-image: url('https://pic.52112.com/180806/JPG-180806_137/snGKKqQOtT_small.jpg');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            /* 动画：行驶4s → 急刹0.5s → 静止1.5s，循环 */
            animation: diagonalDriveAndBrake 6s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        /* 斜向行驶+急刹动画关键帧 */
        @keyframes diagonalDriveAndBrake {
            /* 0% ~ 66.6%：平稳斜向行驶阶段（4秒） */
            0% {
                right: 0;
                bottom: 0;
                transform: translateY(0px) skewX(0deg);
            }
            33.3% {
                transform: translateY(-1px) skewX(0deg); /* 轻微颠簸 */
            }
            66.6% {
                right: 20px; /* 行驶到左上角附近 */
                bottom: 110px;
                transform: translateY(0px) skewX(0deg);
            }
            /* 66.6% ~ 75%：急刹阶段（0.5秒）——车身前倾+抖动 */
            70% {
                right: 17px; /* 微小前冲（车头向左，所以right减小） */
                bottom: 112px;
                transform: translateY(2px) skewX(-3deg); /* 前倾模拟刹车点头 */
            }
            72% {
                transform: translateY(1px) skewX(1deg); /* 回弹抖动 */
            }
            74% {
                transform: translateY(0px) skewX(-1deg);
            }
            /* 75% ~ 100%：静止阶段（1.5秒） */
            75%, 100% {
                right: 17px;
                bottom: 112px;
                transform: translateY(0px) skewX(0deg);
            }
        }
    </style>
</head>
<body>
    <div class="road">
        <div class="car"></div>
    </div>
</body>
</html>
