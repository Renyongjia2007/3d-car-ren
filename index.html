<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Animation Demo</title>
    <style>
        .car-box {
            width: 200px;
            height: 200px;
            background-image: url('https://pic.52112.com/180806/JPG-180806_137/snGKKqQOtT_small.jpg');
            background-size: cover;
            background-position: center;
            animation: slide 8s linear infinite;
        }

        @keyframes slide {
            0% {
                background-position: 0% 50%;
            }
            100% {
                background-position: 100% 50%;
            }
        }
    </style>
</head>
<body>
    <div class="car-box"></div>
</body>
</html>
