<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Full Diagonal Drive & Brake</title>
    <style>
        /* 容器：200px×200px，允许车辆完整显示 */
        .road {
            width: 200px;
            height: 200px;
            position: relative;
            overflow: hidden;
            background: #ffffff;
        }

        /* 车辆：侧视跑车，尺寸适配容器 */
        .car {
            width: 180px;
            height: 90px;
            position: absolute;
            bottom: 5px;
            right: -10px; /* 初始在右下角，稍微露出 */
            background-image: url('https://pic.52112.com/180806/JPG-180806_137/snGKKqQOtT_small.jpg');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            /* 动画：行驶5s → 急刹0.5s → 静止0.5s，总时长6s */
            animation: diagonalDriveAndBrake 6s cubic-bezier(0.3, 0, 0.3, 1) infinite;
        }

        /* 完整斜向行驶+急刹动画 */
        @keyframes diagonalDriveAndBrake {
            /* 0% ~ 83.3%：平稳斜向行驶（5秒）——从右下角到左上角 */
            0% {
                right: -10px;
                bottom: 5px;
                transform: translateY(0px) skewX(0deg);
            }
            41.65% {
                transform: translateY(-1px) skewX(0deg); /* 轻微颠簸 */
            }
            83.3% {
                right: 130px; /* 行驶到左上角，完整覆盖容器 */
                bottom: 105px;
                transform: translateY(0px) skewX(0deg);
            }
            /* 83.3% ~ 91.6%：急刹阶段（0.5秒） */
            87% {
                right: 127px; /* 微小前冲 */
                bottom: 107px;
                transform: translateY(2px) skewX(-3deg); /* 刹车前倾 */
            }
            89% {
                transform: translateY(1px) skewX(1deg); /* 回弹抖动 */
            }
            91% {
                transform: translateY(0px) skewX(-1deg);
            }
            /* 91.6% ~ 100%：静止阶段（0.5秒） */
            91.6%, 100% {
                right: 17px;
                bottom: 107px;
                transform: translateY(0px) skewX(0deg);
            }
        }
    </style>
</head>
<body>
    <div class="road">
        <div class="car"></div>
    </div>
</body>
</html>
